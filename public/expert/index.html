<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#181818">
  <title>MIND · Live-Fahrplan</title>
  <style>
    :root {
      --bg-color: #121212;
      --card-bg: #1c1c1e;
      --border-color: #2c2c2e;
      --text-main: #ffffff;
      --text-muted: #9a9a9f;
      --brand-red: #852323;
      --green-live: #30d158;
      --red-delay: #ff453a;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 1. Chrome (Suche & Verbindungsstatus) */
    .chrome {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .connection {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      transition: background-color 0.3s, box-shadow 0.3s;
    }
    .dot.live {
      background-color: var(--green-live);
      box-shadow: 0 0 8px var(--green-live);
    }
    .dot.error {
      background-color: var(--red-delay);
      box-shadow: 0 0 8px var(--red-delay);
    }
    .dot.orange {
      background-color: #ff9f0a;
      box-shadow: 0 0 8px #ff9f0a;
    }

    .search {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .search label {
      display: none; /* Screenreader-freundlich aber visuell ausgeblendet */
    }
    .search input {
      flex-grow: 1;
      background-color: #2c2c2e;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-main);
      padding: 10px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search input:focus {
      border-color: var(--brand-red);
    }
    .search button {
      background-color: var(--brand-red);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .search button:hover {
      opacity: 0.9;
    }

    /* 2. Board Container (Das Anzeigeband) */
    .board {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Roter Header im bahn.expert / DB-Stil */
    .identity {
      background-color: var(--brand-red);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
    }
    .identity .service {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    .identity .destination {
      font-size: 16px;
      font-weight: 600;
      margin-left: auto;
      margin-right: 16px;
      text-align: right;
    }
    .identity .live-status {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0, 0, 0, 0.25);
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .identity .live-status .dot {
      width: 6px;
      height: 6px;
    }

    /* Meta-Bar unter dem roten Band */
    .meta {
      background-color: #242426;
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-color);
    }
    .meta strong {
      color: var(--text-main);
    }

    /* 3. Stations-Liste & Reihen */
    .station-list {
      display: flex;
      flex-direction: column;
    }

    .station-row {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      transition: background-color 0.15s;
    }
    .station-row:last-child {
      border-bottom: none;
    }
    .station-row:hover {
      background-color: #242426;
    }

    /* Linke Spalte: Zeiten */
    .time-col {
      width: 140px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .time-line {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 18px;
    }
    .time-line .planned {
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 400;
      width: 38px;
    }
    .time-line .actual {
      font-size: 14px;
    }
    .time-line .actual.color-green {
      color: var(--green-live);
    }
    .time-line .actual.color-red {
      color: var(--red-delay);
    }
    .time-line .actual.state-actual {
      font-weight: 800;
    }
    .time-line .actual.state-prognosis {
      font-weight: 300;
      opacity: 0.8;
    }

    /* Visuelle Timeline-Verbindung (Mittellinie mit Knoten) */
    .timeline-col {
      width: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      align-self: stretch;
      position: relative;
      margin-right: 8px;
    }
    .timeline-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background-color: #48484a;
    }
    .station-row:first-child .timeline-line {
      top: 50%;
    }
    .station-row:last-child .timeline-line {
      bottom: 50%;
    }
    .timeline-node {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #8e8e93;
      z-index: 1;
      margin-top: auto;
      margin-bottom: auto;
    }
    /* Wenn der Zug aktuell an diesem Bahnhof steht */
    .station-row.active-station .timeline-node {
      background-color: var(--green-live);
      box-shadow: 0 0 6px var(--green-live);
    }

    /* Stationsname */
    .station-name {
      flex-grow: 1;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-main);
      padding-right: 12px;
    }
    .station-name .code {
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 400;
      margin-left: 4px;
    }

    /* Gleis-Spalte */
    .track-col {
      width: 60px;
      text-align: right;
      font-size: 14px;
      color: var(--text-muted);
    }
    .track-col .planned-track {
      color: var(--text-main);
      font-weight: 500;
    }
    .track-col .track-actual {
      color: var(--red-delay);
      font-weight: bold;
      margin-left: 2px;
    }

    /* Systemmeldungen (Start, Fehler, Laden) */
    .message {
      padding: 40px 24px;
      text-align: center;
    }
    .message h1 {
      font-size: 20px;
      margin: 0 0 8px 0;
      font-weight: 700;
    }
    .message p {
      font-size: 14px;
      color: var(--text-muted);
      margin: 0;
    }
    .message.error h1 {
      color: var(--red-delay);
    }
    .message button {
      margin-top: 16px;
      background-color: #2c2c2e;
      color: var(--text-main);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .message button:hover {
      background-color: #3a3a3c;
    }
  </style>
</head>
<body>
  <main class="app">
    <!-- 1. Header (Suche & Verbindungsstatus) -->
    <header class="chrome">
      <div class="connection" aria-live="polite">
        <i class="dot" id="connection-dot"></i>
        <span id="connection-label">Verbindung wird hergestellt</span>
      </div>
      <form class="search" id="train-search">
        <label for="train-number">Zugnummer suchen</label>
        <input id="train-number" name="train" inputmode="numeric" autocomplete="off" placeholder="Zugnummer eingeben">
        <button type="submit">Anzeigen</button>
      </form>
    </header>

    <!-- 2. Der eigentliche Live-Fahrplan -->
    <section class="board" aria-live="polite">
      <header class="identity">
        <div class="service" id="service-name">MINDExpert</div>
        <div class="destination" id="destination"></div>
        <div class="live-status">
          <i class="dot live"></i>
          <span id="realtime-label">LIVE</span>
        </div>
      </header>
      <div class="meta">
        <span id="service-state">Zug auswählen</span>
        <span>Stand <strong id="updated-time">--:--:--</strong></span>
      </div>
      <!-- In diesem Container wird alles dynamisch gerendert (Systemmeldungen ODER die Stations-Liste) -->
      <div id="content" class="message">
        <h1>Fahrplan bereit</h1>
        <p>Gib oben eine Zugnummer ein, um die Live-Daten aus Roblox zu laden.</p>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const $ = id => document.getElementById(id);
      const input = $('train-number'), 
            content = $('content'), 
            service = $('service-name'), 
            destination = $('destination'), 
            state = $('service-state'), 
            stamp = $('updated-time'), 
            dot = $('connection-dot'), 
            connection = $('connection-label');
            
      let trainNumber = new URLSearchParams(location.search).get('train') || '', 
          source, 
          refreshTimer;
          
      input.value = trainNumber;

      const setConnection = (kind, label) => { 
        dot.className = `dot ${kind}`; 
        connection.textContent = label; 
      };

      const setMessage = (title, text, isError = false) => { 
        content.className = `message${isError ? ' error' : ''}`; 
        content.replaceChildren(); 
        
        const h = document.createElement('h1'); 
        h.textContent = title; 
        
        const p = document.createElement('p'); 
        p.textContent = text; 
        
        content.append(h, p); 

        // Bei Fehlern oder Infotexten setzen wir die Header-Meta-Daten zurück
        service.textContent = "MINDExpert";
        destination.textContent = "";
        state.textContent = "Zug auswählen";

        if (isError && trainNumber) { 
          const b = document.createElement('button'); 
          b.textContent = 'Erneut versuchen'; 
          b.onclick = load; 
          content.append(b); 
        } 
      };

      // Baut eine einzelne Zeile (Ankunft oder Abfahrt) innerhalb der Zeitspalte
      function buildTimeRow(timeObj) {
        if (!timeObj) return '';
        
        let actualSpan = '';
        if (timeObj.actual) {
          const colorClass = `color-${timeObj.color}`;
          const stateClass = timeObj.isPrognosis ? 'state-prognosis' : 'state-actual';
          
          // Verspätung formatieren (z. B. "+3" oder "-1")
          const delayText = timeObj.delay > 0 ? ` (+${timeObj.delay})` : (timeObj.delay < 0 ? ` (${timeObj.delay})` : '');
          actualSpan = `<span class="actual ${colorClass} ${stateClass}">${timeObj.actual}${delayText}</span>`;
        } else {
          actualSpan = `<span class="actual state-prognosis">—</span>`;
        }

        return `
          <div class="time-line">
            <span class="planned">${timeObj.planned}</span>
            ${actualSpan}
          </div>
        `;
      }

      function render(data) {
        // 1. Metadaten des Zugs aktualisieren
        const label = `${data.type || ''}${data.line || ''}` || `Zug ${trainNumber}`;
        service.textContent = `${label}${data.trainnumber ? ` (${data.trainnumber})` : ''}`;
        destination.textContent = data.destination || 'Fahrplan';
        state.textContent = data.isActive ? 'Fahrt läuft' : 'Noch nicht gestartet';
        
        const updateDate = data.updatedAt ? new Date(data.updatedAt) : new Date();
        stamp.textContent = new Intl.DateTimeFormat('de-DE', {
          hour: '2-digit', minute: '2-digit', second: '2-digit'
        }).format(updateDate);

        // 2. Stations-Liste aufbauen
        const listContainer = document.createElement('div');
        listContainer.className = 'station-list';

        const route = Array.isArray(data.route) ? data.route : [];
        route.forEach(stop => {
          const row = document.createElement('div');
          row.className = 'station-row';

          // Wenn der Zug an der Station steht (Angekommen, aber noch nicht abgefahren)
          const arrLive = stop.arrival && stop.arrival.isLive && !stop.arrival.isPrognosis;
          const depLive = stop.departure && stop.departure.isLive && !stop.departure.isPrognosis;
          if (arrLive && !depLive) {
            row.classList.add('active-station');
          }

          // Linke Spalte: Zeiten
          const timeCol = document.createElement('div');
          timeCol.className = 'time-col';
          
          let timeColHTML = '';
          if (stop.arrival) timeColHTML += buildTimeRow(stop.arrival);
          if (stop.departure) timeColHTML += buildTimeRow(stop.departure);
          if (!stop.arrival && !stop.departure) timeColHTML = '—';
          
          timeCol.innerHTML = timeColHTML;
          row.append(timeCol);

          // Mittlere Spalte 1: Visuelle Timeline-Verbindung
          const timelineCol = document.createElement('div');
          timelineCol.className = 'timeline-col';
          
          const timelineLine = document.createElement('div');
          timelineLine.className = 'timeline-line';
          
          const timelineNode = document.createElement('div');
          timelineNode.className = 'timeline-node';
          
          timelineCol.append(timelineLine, timelineNode);
          row.append(timelineCol);

          // Mittlere Spalte 2: Stationsname (+ optionaler Ril-Code)
          const nameCol = document.createElement('div');
          nameCol.className = 'station-name';
          nameCol.textContent = stop.stationName || `Station ${stop.stationId}`;
          row.append(nameCol);

          // Rechte Spalte: Gleis-Informationen (Gleisänderungen abfangen)
          const trackCol = document.createElement('div');
          trackCol.className = 'track-col';
          
          let trackHTML = `<span class="planned-track">${stop.plannedTrack || '—'}</span>`;
          if (stop.actualTrack && String(stop.actualTrack) !== String(stop.plannedTrack)) {
            trackHTML = `<span class="planned-track">${stop.actualTrack}</span> <span class="track-actual">(${stop.plannedTrack})</span>`;
          }
          trackCol.innerHTML = trackHTML;
          row.append(trackCol);

          listContainer.append(row);
        });

        // Content leeren und die generierte Liste einfügen
        content.className = '';
        content.replaceChildren(listContainer);
      }

      async function load() {
        if (!trainNumber) { 
          setMessage('Fahrplan bereit', 'Gib oben eine Zugnummer ein, um die Live-Daten aus dem Roblox-Netz zu laden.'); 
          return; 
        }
        setMessage('Lade Zugdaten', 'Der aktuelle Laufweg wird abgerufen.');
        try {
          const response = await fetch(`/api/roblox-expert/trains/${encodeURIComponent(trainNumber)}`, {
            headers: { Accept: 'application/json' }
          });
          if (!response.ok) {
            throw new Error(response.status === 404 ? 'Dieser Zug wurde nicht gefunden.' : 'Die Zugdaten sind derzeit nicht verfügbar.');
          }
          const data = await response.json();
          render(data);
          setConnection('live', 'Live verbunden');
        } catch(error) {
          setConnection('error', 'Verbindung unterbrochen');
          setMessage('Fahrplan nicht verfügbar', error.message || 'Bitte versuche es erneut.', true);
        }
      }

      function connectStream() {
        if (!('EventSource' in window)) return;
        source = new EventSource('/api/roblox-expert/stream');
        source.onopen = () => setConnection('live', 'Live verbunden');
        source.onerror = () => setConnection('error', 'Live-Verbindung wird wiederhergestellt');
        source.onmessage = event => {
          try {
            const data = JSON.parse(event.data);
            const changed = String(data.trainNumber || data.trainnumber || data.id || '');
            if (!changed || changed === trainNumber) { 
              clearTimeout(refreshTimer); 
              refreshTimer = setTimeout(load, 150); 
            }
          } catch { 
            if (trainNumber) load(); 
          }
        };
      }

      $('train-search').addEventListener('submit', event => { 
        event.preventDefault(); 
        const next = input.value.trim(); 
        if (!next) return; 
        trainNumber = next; 
        const url = new URL(location.href); 
        url.searchParams.set('train', trainNumber); 
        history.pushState({}, '', url); 
        load(); 
      });

      window.addEventListener('popstate', () => { 
        trainNumber = new URLSearchParams(location.search).get('train') || ''; 
        input.value = trainNumber; 
        load(); 
      });

      connectStream(); 
      if (trainNumber) load();
    })();
  </script>
</body>
</html>
